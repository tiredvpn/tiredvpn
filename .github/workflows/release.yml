name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            tiredvpn/tiredvpn:latest
            tiredvpn/tiredvpn:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" -o tiredvpn-linux-amd64 ./cmd/tiredvpn/
          tar -czf tiredvpn-linux-amd64.tar.gz tiredvpn-linux-amd64

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -ldflags="-s -w" -o tiredvpn-linux-arm64 ./cmd/tiredvpn/
          tar -czf tiredvpn-linux-arm64.tar.gz tiredvpn-linux-arm64

      - name: Generate checksums
        run: |
          sha256sum \
            tiredvpn-linux-amd64.tar.gz \
            tiredvpn-linux-arm64.tar.gz \
            > checksums.txt

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<CHANGELOG_EOF"
            printf '%s\n' "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            tiredvpn-linux-amd64.tar.gz
            tiredvpn-linux-arm64.tar.gz
            checksums.txt
