name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1' # Weekly security scan

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Build
        run: go build ./cmd/tiredvpn/
      - name: Vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Unit Tests with Coverage
        run: |
          go test -race -timeout 5m -short \
            -skip "TestWebSocket|TestQUICSalamander|TestDefaultPadding|TestConfusedConnWrite" \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./internal/...

      - name: Coverage Summary
        run: |
          go tool cover -func=coverage.out | tail -1
          echo "---"
          echo "Per-package coverage:"
          go tool cover -func=coverage.out | grep "^github.com" | awk '{print $1}' | \
            sed 's|github.com/tiredvpn/tiredvpn/||' | sort -u | while read pkg; do
              pct=$(go tool cover -func=coverage.out | grep "$pkg" | tail -1 | awk '{print $NF}')
              echo "  $pkg: $pct"
            done

      - name: Upload Coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30

  integration:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Integration Tests
        run: |
          go test -race -timeout 10m -count=1 -v \
            -skip "TestWebSocketPaddedIntegration|TestWebSocketPaddedMultipleMessages|TestWebSocketPaddedLargePayload|TestDefaultPaddingMode" \
            ./internal/strategy/ \
            ./internal/porthopping/ \
            ./internal/server/ \
            ./internal/mux/

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Localhost Benchmark
        run: bash scripts/ci-benchmark.sh
        timeout-minutes: 5

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vuln_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
        continue-on-error: true

  security_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, test, integration, lint]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (edge)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: tiredvpn/tiredvpn:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
